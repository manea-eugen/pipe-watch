name: PipelineNotifications
options:
  bundleIdPrefix: com.emanea
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  PipelineNotifications:
    type: application
    platform: macOS
    sources:
      - PipelineNotifications
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: PipelineNotifications.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.emanea.PipelineNotifications
        PRODUCT_NAME: Pipeline Notifications
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
    resources:
      - Assets.xcassets
